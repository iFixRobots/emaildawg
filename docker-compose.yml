version: '3.8'

services:
  mautrix-emaildawg:
    build: .
    restart: unless-stopped
    volumes:
      - ./config.yaml:/opt/mautrix-emaildawg/config.yaml:ro
      - ./registration.yaml:/opt/mautrix-emaildawg/registration.yaml:ro
      - emaildawg_data:/opt/mautrix-emaildawg/data
    ports:
      - "29319:29319"
    depends_on:
      - postgres
    environment:
      - MAUTRIX_CONFIG_PATH=/opt/mautrix-emaildawg/config.yaml
    networks:
      - mautrix

  # Optional: PostgreSQL database (remove if using SQLite)
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mautrix_emaildawg
      POSTGRES_PASSWORD: your_secure_password_here
      POSTGRES_DB: mautrix_emaildawg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mautrix

volumes:
  emaildawg_data:
    driver: local
  postgres_data:
    driver: local

networks:
  mautrix:
    driver: bridge
