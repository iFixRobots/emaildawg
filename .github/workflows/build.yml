name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        
    - name: Install libolm (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libolm-dev
        
    - name: Install libolm (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install libolm
      
    - name: Build
      run: make build
      
    - name: Test
      run: make test
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mautrix-emaildawg-${{ matrix.os }}
        path: mautrix-emaildawg
