name: emaildawg
displayname: Email (IMAP)
description: A Matrix bridge for email (IMAP) using the mautrix bridgev2 framework
version: "0.1.0"
repository: https://github.com/iFixRobots/emaildawg
license: AGPL-3.0

platforms:
  - linux/amd64
  - linux/arm64

docker:
  image: ghcr.io/ifixrobots/mautrix-emaildawg
  ports:
    - "29319"
  volumes:
    - "./data:/data"
  environment:
    - "MAUTRIX_EMAILDAWG_CONFIG_FILE=/data/config.yaml"

config:
  path: /data/config.yaml
  generate_command: ["./mautrix-emaildawg", "--generate-example-config", "/data/config.yaml"]

registration:
  path: /data/registration.yaml
  generate_command: ["./mautrix-emaildawg", "--generate-registration", "/data/registration.yaml", "--config", "/data/config.yaml"]

startup_commands:
  - ["./mautrix-emaildawg", "--config", "/data/config.yaml"]

network_id: email

features:
  - login_flows
  - message_bridging
  - media_bridging
  - threading
  - read_receipts
  - presence
  - ghost_users

dependencies:
  homeserver: synapse

metadata:
  bridge_type: puppeting
  protocol: email-imap
  framework: bridgev2
  encryption_support: true
  double_puppeting: false
  relay_mode: false
  ghost_prefix: "email_"
  bot_username: emaildawgbot
  network_id: email
